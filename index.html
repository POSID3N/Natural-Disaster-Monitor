<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description"
    content="Real-time world events monitoring - conflicts, climate, disasters, and global intelligence">
  <meta name="theme-color" content="#0d1117">
  <title>World Events Monitor | Real-time Global Intelligence</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- MapLibre GL -->
  <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
  <!-- Alert Ticker -->
  <div id="alert-ticker" class="alert-ticker" role="alert" aria-live="polite" aria-atomic="true">
    <div class="alert-ticker__content">
      <span class="alert-ticker__icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0zm0 12a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm0-9a1 1 0 0 0-1 1v6a1 1 0 2 0V4a1 1 0 0 0-1-1z" />
        </svg>
      </span>
      <span class="alert-ticker__text">Initializing real-time monitoring...</span>
    </div>
    <button class="alert-ticker__close" aria-label="Dismiss alert">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <path
          d="M7 6.293l4.146-4.147a.5.5 0 0 1 .708.708L7.707 7l4.147 4.146a.5.5 0 0 1-.708.708L7 7.707l-4.146 4.147a.5.5 0 0 1-.708-.708L6.293 7 2.146 2.854a.5.5 0 1 1 .708-.708L7 6.293z" />
      </svg>
    </button>
  </div>

  <!-- App Container -->
  <div id="app" class="app">
    <!-- Header -->
    <header class="app-header" role="banner">
      <div class="app-header__brand">
        <div class="app-header__logo">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <circle cx="16" cy="16" r="14" stroke="#ff3366" stroke-width="2" fill="none" />
            <circle cx="16" cy="16" r="4" fill="#ff3366" />
            <path d="M16 2v6M16 24v6M2 16h6M24 16h6" stroke="#ff3366" stroke-width="2" stroke-linecap="round" />
          </svg>
          <span class="app-header__title">WORLDMONITOR</span>
        </div>
        <div class="live-indicator">
          <span class="live-indicator__pulse"></span>
          <span class="live-indicator__text">LIVE</span>
        </div>
      </div>

      <div class="app-header__actions">
        <button id="fab-toggle-panel" class="fab-toggle-header" aria-label="Toggle intelligence panel" title="Toggle Intelligence Panel">
          <svg id="fab-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
          <svg id="fab-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main" role="main">

      <!-- Map Container -->
      <div class="map-wrapper" role="application" aria-label="Interactive world map">
        <button id="reset-view" class="map-control map-control--large" aria-label="Reset map view" style="position: absolute; top: 16px; left: 16px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
          </svg>
        </button>
        <div id="map" class="map"></div>

        <!-- Time Range Controls -->
        <div class="time-slider" id="timeSlider">
          <span class="time-slider-label">TIME RANGE</span>
          <div class="time-slider-buttons">
            <button class="time-btn time-btn--active" data-range="1h">1H</button>
            <button class="time-btn" data-range="6h">6H</button>
            <button class="time-btn time-btn--active" data-range="24h">24H</button>
            <button class="time-btn" data-range="48h">48H</button>
            <button class="time-btn" data-range="7d">7D</button>
            <button class="time-btn" data-range="all">ALL</button>
          </div>
        </div>

        <!-- Legend -->
        <div class="map-legend" role="region" aria-label="Map legend">
          <h4 class="map-legend__title">Event Types</h4>
          <div class="legend-items">
            <label class="legend-item">
              <span class="legend-item__marker" style="background: #ff6b6b"></span>
              <span class="legend-item__label">Wildfire</span>
              <input type="checkbox" class="legend-checkbox" data-layer="wildfires" checked>
            </label>
            <label class="legend-item">
              <span class="legend-item__marker" style="background: #48dbfb"></span>
              <span class="legend-item__label">Earthquake</span>
              <input type="checkbox" class="legend-checkbox" data-layer="earthquakes" checked>
            </label>
          </div>
        </div>

        <!-- Map Controls -->
        <div class="map-controls" role="toolbar" aria-label="Map navigation controls">
        </div>
      </div>

      <!-- Right Sidebar: Event Feed -->
      <aside id="event-panel" class="feed-panel glass-panel" role="complementary" aria-label="Live intelligence feed">
        <div class="feed-panel__header">
          <h2 class="feed-panel__title">Live Intelligence</h2>
          <span id="event-count" class="feed-panel__count">0 Events</span>
        </div>
        <div class="feed-panel__filters" id="feedFilters">
          <button class="feed-filter active" data-filter="all" id="filter-all">All Events</button>
          <button class="feed-filter" data-filter="earthquakes" id="filter-earthquakes">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1a7 7 0 100 14A7 7 0 008 1zM2 8l3-2 2 3 2-4 3 2 2-1" />
            </svg>
            Earthquakes
          </button>
          <button class="feed-filter" data-filter="wildfires" id="filter-wildfires">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 0S3 5 3 9a5 5 0 0010 0c0-4-5-9-5-9zm0 12a3 3 0 01-3-3c0-2 3-5 3-5s3 3 3 5a3 3 0 01-3 3z" />
            </svg>
            Wildfires
          </button>
        </div>
        <div id="event-list" class="event-list" role="feed" aria-busy="false">
          <!-- Events populated by JS -->
          <div class="event-list__empty">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="24" cy="24" r="20" />
              <path d="M24 14v10l6 6" />
            </svg>
            <p>Loading events...</p>
          </div>
        </div>
        <button id="load-more" class="btn btn--secondary btn--full" hidden>Load More</button>
      </aside>
    </main>

    <!-- Event Detail Drawer -->
    <div id="detail-overlay" class="detail-drawer" role="dialog" aria-modal="true" aria-hidden="true"
      aria-labelledby="detail-title">
      <div class="detail-drawer__backdrop" id="detail-close-backdrop"></div>
      <div class="detail-drawer__panel glass-panel">
        <div class="detail-drawer__header">
          <h2 id="detail-title" class="detail-drawer__title">Briefing Details</h2>
          <button id="detail-close" class="btn btn--icon detail-drawer__close" aria-label="Close details">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd" />
            </svg>
          </button>
        </div>
        <div id="detail-content" class="detail-drawer__content">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Notification Panel -->
    <div id="notification-panel" class="notification-panel" role="dialog" aria-modal="true" aria-hidden="true"
      aria-labelledby="notification-title">
      <div class="notification-panel__header">
        <h3 id="notification-title" class="notification-panel__title">Notifications</h3>
        <button id="notification-close" class="btn btn--ghost btn--icon" aria-label="Close notifications">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path
              d="M10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 011.414-1.414L10 8.586z" />
          </svg>
        </button>
      </div>
      <div id="notification-list" class="notification-list">
        <!-- Populated by JS -->
        <div class="notification-list__empty">No new notifications</div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="./src/main.js"></script>
</body>

</html>
